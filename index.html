<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 450px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

.search-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
}

input {
  flex: 1;
  padding: 14px 20px;
  border-radius: 15px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 16px;
  outline: none;
}
input::placeholder { color: rgba(255,255,255,0.7); }

.btn {
  padding: 14px;
  border-radius: 15px;
  border: none;
  background: white;
  cursor: pointer;
  font-size: 20px;
}

.main {
  text-align: center;
  color: white;
}

.temp { font-size: 90px; font-weight: 700; line-height: 1; }
.city { font-size: 24px; margin: 5px 0; }
.time { font-size: 18px; opacity: 0.8; margin-bottom: 15px; }
.desc { font-size: 18px; opacity: 0.9; text-transform: capitalize; }

.details {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 30px;
}

.detail-box {
  background: rgba(255,255,255,0.15);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  color: white;
}
.detail-box div:first-child { font-size: 13px; opacity: 0.8; }
.detail-box div:last-child { font-size: 20px; font-weight: 600; margin-top: 5px; }

.forecast {
  margin-top: 25px;
  background: rgba(255,255,255,0.15);
  padding: 20px;
  border-radius: 15px;
  color: white;
}
.forecast h3 { margin-bottom: 15px; font-size: 16px; opacity: 0.9; }
.day {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.day:last-child { border-bottom: none; }

.loader { text-align: center; color: white; padding: 40px 0; font-size: 18px; }
.error { text-align: center; color: #ffcccc; padding: 40px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search city...">
    <button class="btn" id="locBtn">📍</button>
  </div>

  <div id="content">
    <div class="loader">Search a city or use location</div>
  </div>
</div>

<script>
const API_KEY = "c8a4bc4d3c964a22098e0e4f979f0a9a";
const search = document.getElementById('search');
const locBtn = document.getElementById('locBtn');
const content = document.getElementById('content');

search.addEventListener('keypress', e => {
  if (e.key === 'Enter' && search.value) getWeatherByCity(search.value);
});

locBtn.addEventListener('click', getLocationWeather);

function getLocationWeather() {
  if (!navigator.geolocation) {
    alert("Location not supported");
    return;
  }
  content.innerHTML = '<div class="loader">Getting location...</div>';
  navigator.geolocation.getCurrentPosition(pos => {
    getWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
  }, () => {
    content.innerHTML = '<div class="error">Location denied</div>';
  });
}

async function getWeatherByCity(city) {
  content.innerHTML = '<div class="loader">Loading...</div>';
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
    const data = await res.json();
    if (data.cod!== 200) throw new Error();
    showWeather(data);
  } catch {
    content.innerHTML = '<div class="error">City not found</div>';
  }
}

async function getWeatherByCoords(lat, lon) {
  const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
  const data = await res.json();
  showWeather(data);
}

function showWeather(data) {
  const localTime = getLocalTime(data.timezone);
  const forecast = getForecast(data.coord.lat, data.coord.lon);

  content.innerHTML = `
    <div class="main">
      <div class="temp">${Math.round(data.main.temp)}°</div>
      <div class="city">${data.name}, ${data.sys.country}</div>
      <div class="time">${localTime}</div>
      <div class="desc">${data.weather[0].description}</div>
    </div>

    <div class="details">
      <div class="detail-box"><div>Wind</div><div>${data.wind.speed} km/h</div></div>
      <div class="detail-box"><div>Humidity</div><div>${data.main.humidity}%</div></div>
      <div class="detail-box"><div>Feels</div><div>${Math.round(data.main.feels_like)}°</div></div>
    </div>

    <div class="forecast" id="forecast">
      <h3>5-Day Forecast</h3>
      <div class="loader">Loading forecast...</div>
    </div>
  `;

  forecast.then(renderForecast);
}

async function getForecast(lat, lon) {
  const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
  const data = await res.json();
  const days = {};
  data.list.forEach(item => {
    const date = new Date(item.dt * 1000).toLocaleDateString('en', {weekday: 'short'});
    if (!days[date]) days[date] = {date, max: -100, min: 100, icon: item.weather[0].icon};
    days[date].max = Math.max(days[date].max, item.main.temp_max);
    days[date].min = Math.min(days[date].min, item.main.temp_min);
  });
  return Object.values(days).slice(0, 5);
}

function renderForecast(days) {
  document.getElementById('forecast').innerHTML = `
    <h3>5-Day Forecast</h3>
    ${days.map(d => `
      <div class="day">
        <div>${d.date}</div>
        <div><img src="https://openweathermap.org/img/wn/${d.icon}@2x.png" width="40"></div>
        <div>${Math.round(d.max)}° / ${Math.round(d.min)}°</div>
      </div>
    `).join('')}
  `;
}

function getLocalTime(offset) {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const local = new Date(utc + offset * 1000);
  return local.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', hour12: true});
}
</script>
</body>
</html>
